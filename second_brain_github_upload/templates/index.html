<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Second Brain AI</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧠</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    
    <div class="app-container">
        <!-- HEADER -->
        <header class="glass-header">
            <div class="logo">
                <img src="https://cdn-hiiah.nitrocdn.com/DWMnljaCYTFTVvfuDwEHkVtUXDHpuJho/assets/images/optimized/rev-ae833bf/www.domenicoschipani.com/wp-content/uploads/2022/05/logo-homepage-300x193.png" alt="Domenico Schipani Logo" class="brand-logo">
                <div class="title-wrapper">
                    <h1>Second Brain <span class="version-tag">v2.0</span></h1>
                </div>
            </div>
            <div class="header-right">
                <p class="motto">"Omnia Mea, Mecum Porto"</p>
                <p class="author">un progetto di: Domenico Schipani</p>
            </div>
        </header>

        <!-- CHAT AREA -->
        <main class="chat-container" id="chat-box">
            <div class="message ai-message">
                <div class="avatar">AI</div>
                <div class="bubble">
                    Ciao! Sono il tuo Second Brain. Ho letto, studiato e assimilato migliaia di concetti estratti da tutti i tuoi corsi, PDF e video. <br><br>
                    Fammi qualsiasi domanda o usa uno dei prompt suggeriti qui sotto!
                </div>
            </div>
        </main>

        <!-- INPUT AREA -->
        <footer class="input-area glass-footer">
            <div class="prompt-suggestions" id="prompt-suggestions">
                <button class="prompt-chip">Estrai i concetti chiave di UX e UI</button>
                <button class="prompt-chip">Qual è il metodo di creazione contenuti per blog?</button>
                <button class="prompt-chip">Metodo per riassumere da post blog a post LinkedIn</button>
            </div>
            <div class="input-wrapper">
                <textarea id="user-input" placeholder="Chiedi al tuo Second Brain..." rows="1"></textarea>
                <button id="send-btn" class="glow-button">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
